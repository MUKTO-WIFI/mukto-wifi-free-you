<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUKTO WI-FI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  background: linear-gradient(135deg,#ff0000,#ffffff);
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:360px;
  padding:25px;
  border-radius:20px;
  background:white;
  box-shadow:0 10px 40px rgba(255,0,0,0.4);
  text-align:center;
}

.title{
  font-size:24px;
  font-weight:700;
  color:#ff0000;
}

.sub{
  font-size:13px;
  color:#666;
  margin-bottom:15px;
}

.packages{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.pkg{
  flex:1;
  padding:12px;
  border-radius:12px;
  background:#f5f5f5;
  cursor:pointer;
  transition:0.3s;
}

.pkg:hover{
  transform:scale(1.05);
}

.active{
  border:2px solid #ff0000;
  background:#ffe5e5;
}

.price{
  font-size:14px;
  margin-top:5px;
}

.features{
  text-align:left;
  font-size:12px;
  margin:10px 0;
  color:#444;
}

.features li{
  margin:5px 0;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff0000;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#cc0000;
}

.hidden{display:none;}

.loader{
  border:5px solid #eee;
  border-top:5px solid #ff0000;
  border-radius:50%;
  width:40px;
  height:40px;
  margin:20px auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

.success{
  color:#ff0000;
  font-size:20px;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">📶 MUKTO WI-FI</div>
  <div class="sub">Fast • Secure • Reliable</div>

  <!-- PACKAGES -->
  <div class="packages">
    <div class="pkg active" onclick="selectPkg(this,'free')">
      FREE
      <div class="price">30 min</div>
    </div>

    <div class="pkg" onclick="selectPkg(this,'pro')">
      PRO
      <div class="price">৳20 / 2hr</div>
    </div>
  </div>

  <!-- FEATURES -->
  <ul class="features">
    <li>✔ High Speed Internet</li>
    <li>✔ নিরাপদ সংযোগ</li>
    <li>✔ Buffer-free streaming</li>
    <li>✔ Social media unlimited</li>
  </ul>

  <!-- FORM -->
  <div id="form">
    <input type="text" id="name" placeholder="Your Name">
    <input type="tel" id="phone" placeholder="Mobile Number">
    <button onclick="connect()">Connect Now</button>
  </div>

  <!-- LOADING -->
  <div id="loading" class="hidden">
    <div class="loader"></div>
    <p>Connecting...</p>
  </div>

  <!-- SUCCESS -->
  <div id="success" class="hidden">
    <div class="success">✔ Connected!</div>
    <p id="msg"></p>
  </div>

</div>

<script>

let selected = "free";

function selectPkg(el,type){
  document.querySelectorAll(".pkg").forEach(p=>p.classList.remove("active"));
  el.classList.add("active");
  selected = type;
}

function connect(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  if(!name || !phone){
    alert("সব তথ্য পূরণ করুন!");
    return;
  }

  document.getElementById("form").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");

  setTimeout(()=>{
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("success").classList.remove("hidden");

    let msg = selected === "free"
      ? "🎉 আপনি ৩০ মিনিট ফ্রি ইন্টারনেট পেয়েছেন"
      : "🚀 আপনি PRO প্যাকেজ চালু করেছেন";

    document.getElementById("msg").innerText = msg;

  },2000);
}

</script>

</body>
</html>
